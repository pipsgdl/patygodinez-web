<style>
  @font-face{font-family:"Bruney Season";src:url("https://cdn.jsdelivr.net/gh/pipsgdl/patygodinez-web@main/fuentes/bruney-season.woff2") format("woff2");font-display:swap}
  @font-face{font-family:"New Icon Script";src:url("https://cdn.jsdelivr.net/gh/pipsgdl/patygodinez-web@main/fuentes/New-Icon-Script.woff2") format("woff2");font-display:swap}
  :root{--crema:#f4f0e7;--bosque-hondo:#2f3325;--terracota:#8a4a2c;--lavanda:#c9a7c8;--tinta:#3a3d2e;--tenue:#6d7059;--linea:#ddd6c6;
    --display:"Bruney Season",Didot,Georgia,serif;--firma:"New Icon Script",cursive;--cuerpo:"DIN Alternate","Avenir Next",system-ui,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;background:var(--crema);color:var(--tinta);font-family:var(--cuerpo);line-height:1.55}
  header{background:var(--bosque-hondo);color:#ece8db;text-align:center;padding:2.4rem 1.2rem 2rem}
  header .rot{font-size:.68rem;letter-spacing:.26em;text-transform:uppercase;color:var(--lavanda);font-weight:600}
  header h1{font-family:var(--display);font-weight:400;font-size:clamp(1.8rem,6vw,2.6rem);margin:.5rem 0 .3rem}
  header .firma{font-family:var(--firma);font-size:1.5rem;color:var(--lavanda)}
  .intro{max-width:640px;margin:1.6rem auto 0;padding:0 1.2rem;color:var(--tenue);font-size:.95rem;text-align:center}
  .grid{max-width:920px;margin:1.6rem auto 7rem;padding:0 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.7rem}
  .foto{position:relative;cursor:pointer;display:block}
  .foto img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:8px;display:block;border:3px solid transparent;transition:border-color .15s}
  .foto input{position:absolute;top:.5rem;left:.5rem;width:22px;height:22px;accent-color:var(--terracota);z-index:2}
  .foto .num{position:absolute;bottom:.4rem;right:.5rem;background:rgba(47,51,37,.8);color:#fff;font-size:.72rem;padding:.1rem .45rem;border-radius:6px;font-variant-numeric:tabular-nums}
  .foto input:checked ~ img{border-color:var(--terracota)}
  .barra{position:fixed;bottom:0;left:0;right:0;background:rgba(244,240,231,.96);backdrop-filter:blur(8px);border-top:1px solid var(--linea);padding:.9rem 1rem;display:flex;flex-direction:column;gap:.5rem;align-items:center}
  .cuenta{font-size:.9rem;color:var(--tenue)}
  .cuenta b{color:var(--terracota)}
  button{font-family:var(--cuerpo);font-weight:600;font-size:1rem;border:0;border-radius:8px;padding:.85rem 1.4rem;background:#25D366;color:#fff;cursor:pointer;width:100%;max-width:420px}
  #ok{display:none;font-size:.85rem;color:#2f5127;text-align:center}
</style>
</head>

<div class="barra">
  <div class="cuenta"><b id="c">0</b> fotos elegidas</div>
  <button onclick="enviar()">📲 Enviar mi selección por WhatsApp</button>
  <div id="ok"></div>
</div>
<script>
  var boxes=document.querySelectorAll('.foto input');
  var orden=[];
  boxes.forEach(function(b){ b.addEventListener('change',function(){
    if(b.checked) orden.push(b.value); else orden=orden.filter(function(x){return x!==b.value});
    document.getElementById('c').textContent=orden.length;
  }); });
  function enviar(){
    if(!orden.length){ o("Primero toca las fotos que te gusten 🙂"); return; }
    var t="Elegí estas fotos para mi página 🌿\n\nPortada: foto "+orden[0]+"\nTodas: "+orden.join(", ");
    window.open("https://wa.me/?text="+encodeURIComponent(t),"_blank");
    o("Se abrió WhatsApp — elige a Felipe y envía 💚");
  }
  function o(s){var e=document.getElementById('ok');e.textContent=s;e.style.display="block";}
</script>
